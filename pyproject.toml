[project]
name = "forgery-document-face-embeddings"
version = "0.1.0"
description = "Utilities for doc background + face embeddings for forgery analysis."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
onnx = ["onnxruntime>=1.16"]
cv = ["opencv-python>=4.8"]
face = ["insightface>=0.7", "opencv-python>=4.8"]
dev = ["pytest>=8.0", "ruff>=0.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []
