 [build-system]
 requires = ["setuptools>=68", "wheel"]
 build-backend = "setuptools.build_meta"
 
 [project]
 name = "forgery-detection"
 version = "0.1.0"
 description = "Utilities for document forgery detection embedding workflows."
 readme = "README.md"
 requires-python = ">=3.10"
 authors = [{ name = "Atlas (Cursor Cloud Agent)" }]
 dependencies = ["numpy>=1.24"]
 
 [project.optional-dependencies]
 dev = [
   "pytest>=8",
   "ruff>=0.4",
 ]
 
 [project.scripts]
 forgery-npz-join = "forgery_detection.cli.npz_join:main"
 forgery-cluster = "forgery_detection.cli.cluster:main"
 
 [tool.setuptools]
 package-dir = {"" = "src"}
 
 [tool.setuptools.packages.find]
 where = ["src"]
 
 [tool.ruff]
 line-length = 100
 target-version = "py310"
 
 [tool.ruff.lint]
 select = ["E", "F", "I", "UP", "B"]
 
 [tool.pytest.ini_options]
 testpaths = ["tests"]
