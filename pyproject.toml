 [build-system]
 requires = ["setuptools>=69", "wheel"]
 build-backend = "setuptools.build_meta"
 
 [project]
 name = "document-face-embeddings"
 version = "0.1.0"
 description = "Document background embeddings with face exclusion + face embeddings + clustering utilities."
 readme = "README.md"
 requires-python = ">=3.10"
 dependencies = [
   "numpy>=1.24",
   "pillow>=10",
 ]
 
 [project.optional-dependencies]
 dev = [
   "pytest>=8",
   "ruff>=0.6",
 ]
 arcface = [
   "insightface>=0.7",
   "opencv-python>=4.8",
 ]
 
 [project.scripts]
 docface-embed = "document_face_embeddings.cli.embed:main"
 docface-face-embed = "document_face_embeddings.cli.face_embed:main"
 docface-cluster = "document_face_embeddings.cli.cluster:main"
 
 [tool.setuptools]
 package-dir = {"" = "src"}
 
 [tool.pytest.ini_options]
 testpaths = ["tests"]
 
 [tool.ruff]
 line-length = 100
