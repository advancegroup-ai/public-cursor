 [build-system]
 requires = ["setuptools>=69", "wheel"]
 build-backend = "setuptools.build_meta"
 
 [project]
 name = "atlas-forgery"
 version = "0.1.0"
 description = "Document forgery detection utilities: embeddings + clustering."
 requires-python = ">=3.10"
 dependencies = [
   "numpy>=1.24",
   "pillow>=10.0",
 ]
 
 [project.optional-dependencies]
 dev = [
   "pytest>=8.0",
   "ruff>=0.6",
 ]
 
 [project.scripts]
 atlas-docfront-embed = "atlas_forgery.cli.docfront_embed:main"
 atlas-face-embed = "atlas_forgery.cli.face_embed:main"
 atlas-cluster = "atlas_forgery.cli.cluster:main"
 
 [tool.setuptools]
 package-dir = {"" = "src"}
 
 [tool.setuptools.packages.find]
 where = ["src"]
 
 [tool.pytest.ini_options]
 testpaths = ["tests"]
 
 [tool.ruff]
 line-length = 100
