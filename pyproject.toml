 [project]
 name = "atlas-forgery"
 version = "0.1.0"
 description = "Document forgery detection utilities: background+face embeddings and clustering."
 readme = "README.md"
 requires-python = ">=3.10"
 dependencies = [
   "numpy>=1.24",
   "opencv-python>=4.8",
   "pillow>=10.0",
   "onnxruntime>=1.16",
   "scikit-learn>=1.3",
   "insightface>=0.7.3",
 ]
 
 [project.scripts]
 atlas-embed-single = "atlas_forgery.cli.embed_single:main"
 atlas-cluster-join = "atlas_forgery.cli.cluster_join:main"
 
 [build-system]
 requires = ["setuptools>=68", "wheel"]
 build-backend = "setuptools.build_meta"
 
 [tool.setuptools]
 package-dir = {"" = "src"}
 
 [tool.setuptools.packages.find]
 where = ["src"]
