 [project]
 name = "atlas-forgery"
 version = "0.1.0"
 description = "Portable prototypes for document forgery embeddings and clustering"
 readme = "README.md"
 requires-python = ">=3.10"
 dependencies = [
   "numpy",
   "pillow",
   "opencv-python",
   "onnxruntime",
   "scikit-learn",
   "pandas",
   "insightface",
 ]
 
 [project.scripts]
 atlas-embed-single = "atlas_forgery.cli.embed_single:main"
 atlas-cluster-join = "atlas_forgery.cli.cluster_join:main"
 
 [build-system]
 requires = ["setuptools>=68", "wheel"]
 build-backend = "setuptools.build_meta"
 
 [tool.setuptools.package-dir]
 "" = "src"
 
 [tool.setuptools.packages.find]
 where = ["src"]
