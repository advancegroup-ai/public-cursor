[project]
name = "atlas-forgery"
version = "0.1.0"
description = "Document/face embeddings + clustering utilities."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy",
  "pillow",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "ruff",
]

[project.scripts]
atlas-doc-embed = "atlas_forgery.cli.doc_embed:main"
atlas-face-embed = "atlas_forgery.cli.face_embed:main"
atlas-cluster = "atlas_forgery.cli.cluster:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

