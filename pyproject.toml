 [build-system]
 requires = ["setuptools>=68", "wheel"]
 build-backend = "setuptools.build_meta"
 
 [project]
 name = "atlas-forgery"
 version = "0.1.0"
 description = "Embeddings + clustering utilities for forgery analysis."
 readme = "README.md"
 requires-python = ">=3.10"
 dependencies = [
   "numpy>=1.24",
   "pillow>=10.0",
 ]
 
 [project.optional-dependencies]
 onnx = [
   "onnxruntime>=1.16",
 ]
 face = [
   "insightface>=0.7.3",
   "opencv-python>=4.8",
 ]
 dev = [
   "pytest>=8.0",
 ]
 
 [project.scripts]
 atlas-face-embed = "atlas_forgery.cli.face_embed:main"
 
 [tool.pytest.ini_options]
 testpaths = ["tests"]
 addopts = "-q"
