[project]
name = "atlas-forgery"
version = "0.1.0"
description = "Utilities for document forgery analysis: embeddings, masking, clustering."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
onnx = ["onnxruntime>=1.16"]
insightface = ["insightface>=0.7.3", "opencv-python>=4.8"]
dev = ["pytest>=8", "ruff>=0.4"]

[project.scripts]
atlas-doc-embed = "atlas_forgery.cli.doc_embed:main"
atlas-face-embed = "atlas_forgery.cli.face_embed:main"
atlas-cluster = "atlas_forgery.cli.cluster:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []
