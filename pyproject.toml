[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "forgery-detection"
version = "0.1.0"
description = "Utilities for document forgery embedding alignment and clustering."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Atlas (Cursor Cloud Agent)" }]
dependencies = [
  "numpy",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "ruff",
]

[project.scripts]
forgery-npz-join = "forgery_detection.cli.npz_join:main"

[tool.hatch.build.targets.wheel]
packages = ["src/forgery_detection"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
