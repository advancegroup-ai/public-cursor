[project]
name = "forgery-detection"
version = "0.1.0"
description = "Utilities for document forgery detection experiments (embeddings + clustering)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy",
  "pillow",
]

[project.optional-dependencies]
dev = [
  "pytest",
]

[project.scripts]
forgery-embed-doc-front = "forgery_detection.cli.embed_doc_front:main"
forgery-embed-face = "forgery_detection.cli.embed_face:main"
forgery-cluster-vectors = "forgery_detection.cli.cluster_vectors:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
